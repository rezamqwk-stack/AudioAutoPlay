<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: Tahoma, sans-serif;
      font-size: 14px;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      color: #e94560;
      text-align: center;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
    }
    .toggle input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 26px;
      cursor: pointer;
      transition: .3s;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .3s;
    }
    input:checked + .slider { background: #e94560; }
    input:checked + .slider:before { transform: translateX(22px); }
    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
    }
    #audioCount {
      margin-top: 6px;
      text-align: center;
      font-size: 12px;
      color: #7fdbca;
    }
  </style>
</head>
<body>
  <h3>Auto Audio Player</h3>
  <div class="row">
    <span>پخش خودکار</span>
    <label class="toggle">
      <input type="checkbox" id="toggleBtn" />
      <span class="slider"></span>
    </label>
  </div>
  <div id="status">غیرفعال</div>
  <div id="audioCount"></div>
  <script src="popup.js"></script>
</body>
</html>
